<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>진격의 규리</title>

<style>
body {
  margin:0;
  background: linear-gradient(135deg,#fce7f3,#e0e7ff);
  display:flex;
  flex-direction:column;
  align-items:center;
  font-family:sans-serif;
}

#wrap { display:flex; gap:20px; margin-top:10px; }



canvas {
  border-radius:12px;
  box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

#ui { margin-top:10px; font-weight:bold; }

#rankingBox {
  width:220px;
  padding:18px;
  border-radius:18px;

  background: rgba(255,255,255,0.2);
  backdrop-filter: blur(10px);

  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
  color:#222;

  font-family: 'Pretendard','Noto Sans KR';
}

#rankingBox h3{
  margin:0 0 10px 0;
  text-align:center;
  font-size:18px;
}

.rankItem{
  display:flex;
  justify-content:space-between;
  align-items:center;

  padding:6px 8px;
  border-radius:8px;
  margin-bottom:6px;

  background: rgba(255,255,255,0.4);
}

.rankItem:nth-child(1){
  background: linear-gradient(90deg,#ffd700,#fff5b7);
  font-weight:bold;
}
.rankItem:nth-child(2){
  background: linear-gradient(90deg,#c0c0c0,#eeeeee);
}
.rankItem:nth-child(3){
  background: linear-gradient(90deg,#cd7f32,#f5d3a4);
}

.rankName{
  font-size:13px;
}

.rankScore{
  font-weight:bold;
}
@keyframes smokeFade {
  from {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
  }
  to {
    opacity: 0;
    transform: translate(-50%, -80%) scale(2);
  }
}
#skillBar{
  position:absolute;
  top:12px;
  left:12px;
  display:none;
  gap:8px;
  z-index:10;
}

#skillBar.show {
  display:flex;
}

.skillSet {
  display:none;
}

.skillSet.show {
  display:block;
}
#gameArea {
  position: relative;
}
.skillCard{
  width:110px;              /* 기존 160 → 줄이기 */
  background:rgba(0,0,0,0.45); /* 더 투명 */
  border-radius:10px;
  padding:6px;
  color:white;
  box-shadow:0 3px 8px rgba(0,0,0,0.25);
  backdrop-filter: blur(4px); /* 🔥 유리 느낌 */
}

.skillName{
  font-size:12px;
  margin-bottom:2px;
}

.skillKey{
  font-size:10px;
  opacity:0.6;
  margin-bottom:4px;
}


.bar{
  height:5px;   /* 기존 8 → 줄이기 */
  margin-bottom:4px;
 position: relative; /* ⭐ 추가 */
}
.fill{
  height:100%;
  width:0%;
  position:absolute;
  left:0;
  top:0;
z-index:0; 
}

.fill.duration{
  background:#00ffcc;
}

.fill.cooldown{
  background: rgba(255,85,85,0.6);
}

.skillState{
  font-size:12px;
  text-align:right;
  position: relative;
  z-index:1; /* ⭐ 추가 */
}
#countdown{
  position: fixed; /* ⭐ 핵심 */
}
.gameUI{
  position:absolute;
  top:0px;
  right:7px;
  color:white;
  font-weight:bold;
  font-size:14px;
  text-shadow:0 0 6px black;
  z-index:20;
  pointer-events:none;
  background:rgba(0,0,0,0.4);
  padding:6px 10px;
  border-radius:8px;
}
</style>
</head>

<body>

<h3>🎮 진격의 규리</h3>
<button onclick="startGame()">▶ 게임 시작</button>
<button onclick="goBack()">⬅ 뒤로가기</button>

<div id="wrap">
  <div id="rankingBox">
  <h3>🏆 TOP 10</h3>
  <div id="rankingList"></div>
</div>
  <div id="gameArea">
<div id="countdown" style="
  font-size:30px;
  font-weight:bold;
  color:white;
  text-shadow:0 0 10px black;
  display:none;
  pointer-events:none;
"></div>

   <div id="skillBar">

  <!-- 에렌 -->
  <div id="erenUI" class="skillSet">
    <div class="skillCard">
      <div class="skillName">⚡ Q - 거인화</div>
    

      <div class="bar">

  <div id="leviUI" class="skillSet">

      <div class="skillName">🌀 Q - 회전베기</div>
     

      <div class="bar">
        <div id="leviCooldownFill" class="fill cooldown"></div>
      </div>

      <div class="skillState" id="leviState">READY</div>
    </div>
  </div>

</div>

    <canvas id="gameCanvas" width="720" height="480"></canvas>
<div id="ui" class="gameUI">Time: 0</div>

   </div>
</div>

<!-- 🔥 게임 코드 -->
<script>
const SCALE = 1.2;
function goBack(){
  location.href = "index.html";
}
const startImg = new Image();
startImg.src = "start.png";
const playerImg = new Image();
playerImg.src = "player.png";
const erenImg = new Image();
erenImg.src = "eren.png"; // 
const titanImg = new Image();
titanImg.src = "titan.png";

const enemyImg = new Image();
enemyImg.src = "enemy.png";
const bossImg = new Image();
bossImg.src = "boss.png";
const leviImg = new Image();
leviImg.src = "levi.png";

const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const rect = canvas.getBoundingClientRect();

let player, enemies, startTime, gameOver;
let pausedTime = 0;
let hiddenStart = 0;
let isPaused = false;
let keys = {};
let lastTime = 0;
let secretEn = "rncnrgownak";
let secretKr = "구축해주마";
let secretLeviEn = "dlsfbchlrkd";
let secretLeviKr = "인류최강";
let leviMode = false;
let slashEffects = [];
let inputBuffer = "";
let hiddenMode = false;
let titanMode = false;
let titanCooldown = false;
let erenMode = false;
let lightningActive = false;
let lightningX = 0;
let lightningY = 0;
let titanCooldownTime = 0;
let titanDurationTime = 0;
let lastBossPhase = -1;
let leviCooldownStart = 0;
let leviDurationStart = 0;
let leviSkillActive = false;
let invincible = false;


// 🔥 키 입력 처리 (정석)
document.addEventListener("keydown", e => {

 console.log("key:", e.key);        // 👈 여기 추가
  console.log("buffer:", inputBuffer); // 👈 여기 추가

  if (e.key === "Process") return;

  keys[e.key.toLowerCase()] = true;

  // Q 스킬
 if (e.key.toLowerCase() === "q") {

  // 🔥 에렌
  if (erenMode) {
    if (titanCooldown) return;
    activateTitanMode();
  }

  // 🔥 리바이
  else if (leviMode) {
    activateLeviSkill();
  }

  return;
}

  // 문자 입력
  if (e.key.length === 1) {
    inputBuffer += e.key.toLowerCase();
  }

  if (inputBuffer.length > 20) {
    inputBuffer = inputBuffer.slice(-20);
  }

  // 에렌
 // 🔥 리바이 먼저 검사 (중요)
if (
  inputBuffer.includes(secretLeviEn) ||
  inputBuffer.includes(secretLeviKr)
) {
  activateLeviMode();
}
else if (
  inputBuffer.includes(secretEn) ||
  inputBuffer.includes(secretKr)
) {
  activateHiddenMode();
}
});

// 🔥 이거 반드시 있어야함
document.addEventListener("keyup", e => {
  keys[e.key.toLowerCase()] = false;
});


function updateSkillUI(){

  const cd = document.getElementById("qCooldownFill");
  const dur = document.getElementById("qDurationFill");
  const state = document.getElementById("qState");

  // 🔥 쿨타임
  if (titanCooldown){
    const total = 45000;
    const remain = Math.max(0, total - (Date.now() - titanCooldownTime));

    cd.style.width = (remain / total) * 100 + "%";

    state.innerText = "쿨타임";
    state.style.color = "#ff5555";
  } 
  else {
    cd.style.width = "0%";
  }

  // 🔥 지속시간
  if (titanMode){
    const total = 5000;
    const remain = Math.max(0, total - (Date.now() - titanDurationTime));

    dur.style.width = (remain / total) * 100 + "%";

    state.innerText = "ACTIVE";
    state.style.color = "#00ffcc";
  } 
  else {
    dur.style.width = "0%";

    if (!titanCooldown){
      state.innerText = "READY";
      state.style.color = "#ffffff";
    }
  }
// 🔥 리바이 UI
const leviFill = document.getElementById("leviCooldownFill");
const leviState = document.getElementById("leviState");

if (leviMode) {

  if (leviCooldown) {
    const total = 45000;
    const remain = Math.max(0, total - (Date.now() - leviCooldownStart));

    leviFill.style.width = (remain / total) * 100 + "%";

    leviState.innerText = "쿨타임";
    leviState.style.color = "#ff5555";
  } else {
    leviFill.style.width = "0%";

    leviState.innerText = "READY";
    leviState.style.color = "#ffffff";
  }

}
}
function pauseGameTime() {
  if (!isPaused) {
    isPaused = true;
    hiddenStart = Date.now();
  }
}

function resumeGameTime() {
  if (isPaused) {
    isPaused = false;
    pausedTime += Date.now() - hiddenStart;
  }
}

document.addEventListener("visibilitychange", () => {
  if (document.hidden) pauseGameTime();
  else resumeGameTime();
});

window.addEventListener("blur", pauseGameTime);
window.addEventListener("focus", resumeGameTime);

function startGame(){
  keys = {};
  player = {x:300,y:200,speed:4};
  enemies = [];
  startTime = Date.now();
  gameOver = false;
  lastTime = 0;
  pausedTime = 0;
  isPaused = false;
  inputBuffer = "";

  titanCooldown = false;
  lastBossPhase = 0;
  lightningActive = false;
leviCooldown = false;
  leviCooldownStart = 0;
  requestAnimationFrame(loop);
}

function spawnEnemy(){

  const side = Math.floor(Math.random() * 4);

  let x, y;

  // 🔥 위치를 화면 바깥으로 설정
  if (side === 0) { // 위
    x = Math.random() * canvas.width;
    y = -20;
  }
  else if (side === 1) { // 아래
    x = Math.random() * canvas.width;
    y = canvas.height + 20;
  }
  else if (side === 2) { // 왼쪽
    x = -20;
    y = Math.random() * canvas.height;
  }
  else { // 오른쪽
    x = canvas.width + 20;
    y = Math.random() * canvas.height;
  }

  // 🔥 중심(플레이 영역) 향하도록 방향 계산
  const targetX = canvas.width / 2;
  const targetY = canvas.height / 2;

  let dx = targetX - x;
  let dy = targetY - y;
  const length = Math.hypot(dx, dy);

  dx /= length;
  dy /= length;

  const speed = 1.5 + Math.random() * 2.5;

  enemies.push({
    x,
    y,
    dx,
    dy,
    speed,
    type: "normal",
    dashState: "idle",
    dashTimer: 0
  });
}

setInterval(()=>{
  if(gameOver) return;

  const time = (Date.now() - startTime - pausedTime) / 1000;

  // 일반 적
  const count = 1 + Math.floor(time / 15);
  for (let i = 0; i < count; i++) {
    spawnEnemy();
  }

  // 🔥 30초마다 보스
  const phase = Math.floor(time / 30);

  if (phase > lastBossPhase) {
    spawnBoss();
    lastBossPhase = phase;
  }

},1000);
function spawnBoss(){
  enemies.push({
    x: Math.random()*600,
    y: 0,
    speed: 1.2,
    type: "boss",
    dashState: "idle",
    dashTimer: 60,
    dashTargetX: 0,
    dashTargetY: 0
  });
}

function update(delta){
  if(gameOver) return;

  // 플레이어 이동
  if(keys["arrowup"] || keys["w"]) player.y -= player.speed * delta;
  if(keys["arrowdown"] || keys["s"]) player.y += player.speed * delta;
  if(keys["arrowleft"] || keys["a"]) player.x -= player.speed * delta;
  if(keys["arrowright"] || keys["d"]) player.x += player.speed * delta;

  // 맵 밖 제한
  if (player.x < 0) player.x = 0;
  if (player.y < 0) player.y = 0;
  if (player.x > canvas.width) player.x = canvas.width;
  if (player.y > canvas.height) player.y = canvas.height;

  enemies.forEach(e => {

    let dx = player.x - e.x;
    let dy = player.y - e.y;
    let dist = Math.hypot(dx, dy);
    if (dist === 0) dist = 0.01;

    // 🔥 보스 패턴
    if (e.type === "boss") {

      if (e.dashState === "idle") {

        e.dashTimer -= delta;

        if (e.dashTimer <= 0) {
          e.dashState = "warn";
          e.dashTimer = 180;
          e.dashTargetX = player.x;
          e.dashTargetY = player.y;
        }

        // 평소엔 추적
        e.x += dx/dist * e.speed * delta;
        e.y += dy/dist * e.speed * delta;
      }

      else if (e.dashState === "warn") {

        e.dashTimer -= delta;

        // 멈춤 (긴장감)
        if (e.dashTimer <= 0) {
          e.dashState = "dash";
        }
      }

      else if (e.dashState === "dash") {

        let dx2 = e.dashTargetX - e.x;
        let dy2 = e.dashTargetY - e.y;
        let dist2 = Math.hypot(dx2, dy2);

        if (dist2 < 5) {
          e.dashState = "idle";
          e.dashTimer = 120;
        } else {
          e.x += dx2/dist2 * 12 * delta;
          e.y += dy2/dist2 * 12 * delta;
        }
      }

    } else {
      // 일반 적
e.x += e.dx * e.speed * delta;
e.y += e.dy * e.speed * delta;
    }

    // 🔥 충돌 처리
   let hitRange = 20 * SCALE;
if (e.type === "boss") hitRange = 30 * SCALE;
if (erenMode && titanMode) hitRange = (40 * 2.5) / 2 * SCALE;

    	if (dist < hitRange) {

  // 🔥 리바이 무적
  if (invincible) return;

  // 🔥 에렌 거인 상태 → 적 제거
  if (erenMode && titanMode) {
    spawnSmokeEffect(e.x, e.y);
    enemies = enemies.filter(en => en !== e);
    return;
  }

  // 🔥 이미 죽었으면 무시
  if (gameOver) return;

  // 🔥 게임오버
  gameOver = true;

  const score = ((Date.now() - startTime - pausedTime) / 1000).toFixed(2);

  saveScoreToServer(score);

  setTimeout(() => {
    alert("생존: " + score + "초");
  }, 0);

  return;
}

  });

  // UI 업데이트
  if(!gameOver){
    document.getElementById("ui").innerText =
      "Time: "+((Date.now() - startTime - pausedTime)/1000).toFixed(1);
  }
}
function updateCountdown(){
  const el = document.getElementById("countdown");

  // 🔥 에렌
  if (titanMode) {
    const total = 5000;
    const remain = total - (Date.now() - titanDurationTime);

    if (remain <= 3000 && remain > 0) {
      el.style.display = "block";
      el.innerText = Math.ceil(remain / 1000);
    } else {
      el.style.display = "none";
      return;
    }
  }

  // 🔥 리바이
  else if (leviSkillActive) {
    const total = 3000;
    const remain = total - (Date.now() - leviDurationStart);

    if (remain > 0) {
      el.style.display = "block";
      el.innerText = Math.ceil(remain / 1000);
    } else {
      el.style.display = "none";
      return;
    }
  }

  else {
    el.style.display = "none";
    return;
  }

  // ⭐ 공통 위치 계산
const rect = canvas.getBoundingClientRect();

// 🔥 리바이 전용 위치 + 크기
if (leviSkillActive) {
  el.style.left = rect.left + player.x + "px";
  el.style.top  = rect.top + player.y - 40 + "px"; // 더 아래
  el.style.fontSize = "18px"; // 작게
}

// 🔥 에렌은 기존 유지
else {
  el.style.left = rect.left + player.x + "px";
  el.style.top  = rect.top + player.y - 60 + "px";
  el.style.fontSize = "30px";
}

el.style.transform = "translate(-50%, -50%)";
}
function loop(time){
  if(gameOver) return;

  const delta = (time - lastTime) / 16.67;
  lastTime = time;

  update(delta);
  draw();
  updateSkillUI();
  updateCountdown();

  requestAnimationFrame(loop);
}

function spawnSmokeEffect(x, y){

  const rect = canvas.getBoundingClientRect(); // ⭐ 중요: 여기서 매번 최신 위치 가져옴

  const smoke = document.createElement("div");
  smoke.style.position = "fixed";

  // 🔥 캔버스 위치 보정
  smoke.style.left = (rect.left + x) + "px";
  smoke.style.top = (rect.top + y) + "px";

  smoke.style.width = "30px";
  smoke.style.height = "30px";
  smoke.style.borderRadius = "50%";

  // 🔥 연기 느낌 강화
  smoke.style.background = "rgba(120,120,120,0.7)";
  smoke.style.filter = "blur(2px)";

  smoke.style.transform = "translate(-50%, -50%)";
  smoke.style.animation = "smokeFade 0.5s ease-out forwards";
  smoke.style.pointerEvents = "none";
  smoke.style.zIndex = 9999;

  document.body.appendChild(smoke);

  setTimeout(() => smoke.remove(), 500);
}
function drawLightning(x, y){
  ctx.strokeStyle = "white";
  ctx.lineWidth = 3;

  for (let i = 0; i < 6; i++) {
    ctx.beginPath();
    ctx.moveTo(x + (Math.random() * 10 - 5), 0);

    let currentY = 0;
    while (currentY < y) {
      let nextY = currentY + 20 + Math.random() * 20;
      let nextX = x + (Math.random() * 40 - 20);

      ctx.lineTo(nextX, nextY);
      currentY = nextY;
    }

    ctx.stroke();
  }
}


function draw(){
 if (!player) {
    ctx.drawImage(startImg, 0, 0, canvas.width, canvas.height);
    return;
  }
  ctx.fillStyle = "#C2B280";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // 번개
  if (lightningActive) {
    drawLightning(lightningX, lightningY);
  }

  // 플레이어
let size = 40 * SCALE;

  if (erenMode && titanMode) {
    size = 40 * 2.5 * SCALE;
  }

  ctx.drawImage(
    playerImg,
    player.x - size/2,
    player.y - size/2,
    size,
    size
  );

  // 적
  enemies.forEach(e => {

    const img = e.type === "boss" ? bossImg : enemyImg;
    const size = e.type === "boss" ? 100 : 40;

    ctx.drawImage(
      img,
      e.x - size/2,
      e.y - size/2,
      size,
      size
    );

    // 보스 경고
    if (e.type === "boss" && e.dashState === "warn") {

      ctx.strokeStyle = "red";
      ctx.lineWidth = 2;

      ctx.beginPath();
      ctx.arc(e.dashTargetX, e.dashTargetY, 20, 0, Math.PI * 2);
      ctx.stroke();

      const seconds = Math.ceil(e.dashTimer / 60);

      ctx.fillStyle = "white";
      ctx.font = "20px Arial";
      ctx.textAlign = "center";

      ctx.fillText(seconds, e.x, e.y - 40);
    }
  });

  // 🔥 리바이 이펙트
  slashEffects.forEach((s, i) => {

    ctx.beginPath();
    ctx.arc(s.x, s.y, s.radius, 0, Math.PI * 2);

    ctx.strokeStyle = "rgba(255,255,255," + (s.life/20) + ")";
    ctx.lineWidth = 3;
    ctx.stroke();

    ctx.beginPath();
    ctx.ellipse(s.x, s.y, s.radius, s.radius * 0.6, Math.PI/4, 0, Math.PI*2);
    ctx.stroke();

    s.radius += 8;
    s.life--;

    if (s.life <= 0) {
      slashEffects.splice(i, 1);
    }
  });
}
function activateHiddenMode(){
  if (hiddenMode) return;
  hiddenMode = true;

  document.getElementById("skillBar").classList.add("show");
  
  inputBuffer = "";

  // 게임 멈춤
  gameOver = true;

  // 🔥 검은 화면 생성
  const overlay = document.createElement("div");
  overlay.style.position = "fixed";
  overlay.style.top = "0";
  overlay.style.left = "0";
  overlay.style.width = "100%";
  overlay.style.height = "100%";
  overlay.style.background = "black";
  overlay.style.display = "flex";
  overlay.style.justifyContent = "center";
  overlay.style.alignItems = "center";
  overlay.style.zIndex = "9999";

  // 🔥 대사 텍스트
  const text = document.createElement("div");
  text.innerText = "駆逐してやる。\nこの世から… 一匹残らず！！\n\n구축해주마. 이 세상에서, 한 마리도 남김없이!!";
  text.style.color = "white";
  text.style.fontSize = "28px";
  text.style.textAlign = "center";
  text.style.whiteSpace = "pre-line";

  overlay.appendChild(text);
  document.body.appendChild(overlay);

  // ⏱️ 2.5초 후 에렌 모드 진입
  setTimeout(() => {

    // 🔥 텍스트 변경 (에렌 모드)
    text.innerText = "⚔️ 에렌 모드";

<script type="module">

  getFirestore,
  collection,
  addDoc,
  query,
  orderBy,

  getDocs,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDMPP4cTbMIIAFE7PBykIdydmhOEb_j3UE",
  authDomain: "gyut5-8a2fc.firebaseapp.com",
  projectId: "gyut5-8a2fc",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const rankingRef = collection(db, "ranking");

// 저장
window.saveScoreToServer = async (score) => {
  const q = query(rankingRef, orderBy("score","desc"), limit(10));
  const snapshot = await getDocs(q);

  let isTop10 = false;

  if (snapshot.size < 10) isTop10 = true;
  else {
    const last = snapshot.docs[snapshot.docs.length - 1].data().score;
    if (Number(score) > last) isTop10 = true;
  }

  if (!isTop10) {
    return;
  }

  const name = prompt("TOP10 진입! 이름 입력") || "익명";

  await addDoc(rankingRef, {
    name,
    score: Number(score),
    time: Date.now()
  });
  alert("🏆 랭킹 등록 완료!");
};

// 불러오기
function loadRanking(){
  const q = query(rankingRef, orderBy("score","desc"), limit(10));

  onSnapshot(q, (snapshot)=>{
    const list = document.getElementById("rankingList");
    list.innerHTML = "";

    let i = 1;

    snapshot.forEach(doc=>{
      const d = doc.data();

      const item = document.createElement("div");
      item.className = "rankItem";

      item.innerHTML = `
        <span class="rankName">${i}. ${d.name}</span>
        <span class="rankScore">${d.score}초</span>
      `;

      list.appendChild(item);
      i++;
    });
  });
}
loadRanking();

};
